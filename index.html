<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backrooms — Level 0</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1810;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #2a2618 0%, #0d0c08 70%);
        color: #c9b87a;
        z-index: 10;
        cursor: pointer;
        user-select: none;
        transition: opacity 0.8s ease;
      }
      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #overlay h1 {
        font-size: 2rem;
        font-weight: 300;
        letter-spacing: 0.35em;
        margin-bottom: 0.4rem;
      }
      #overlay .sub {
        font-size: 0.85rem;
        opacity: 0.55;
        letter-spacing: 0.2em;
        margin-bottom: 2rem;
      }
      #overlay .hint {
        font-size: 0.75rem;
        opacity: 0.45;
        line-height: 2;
        text-align: center;
        max-width: 22rem;
      }
      #hud {
        position: fixed;
        bottom: 1.2rem;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(201, 184, 122, 0.3);
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        pointer-events: none;
        z-index: 5;
        opacity: 0;
        transition: opacity 1.2s ease 0.6s;
      }
      #hud.visible {
        opacity: 1;
      }
      #vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 4;
        background: radial-gradient(
          ellipse at center,
          transparent 52%,
          rgba(0, 0, 0, 0.22) 100%
        );
        opacity: 0;
        transition: opacity 1.2s ease;
      }
      #vignette.visible {
        opacity: 1;
      }
    </style>
    <script type="module" crossorigin src="/backroom/assets/index-BOrDi3Cr.js"></script>
  </head>
  <body>
    <div id="overlay">
      <h1>BACKROOMS</h1>
      <p class="sub">LEVEL 0 — THE LOBBY</p>
      <div class="hint">
        클릭하여 시작<br />
        WASD · 이동 &nbsp; Shift · 달리기 &nbsp; 마우스 · 시야<br /><br />
        <em>노란 벽지, 축축한 카펫, 형광등의 웅웅거림…<br />끝없는 빈 방들.</em>
      </div>
    </div>
    <div id="hud">LEVEL 0</div>
    <div id="vignette"></div>
  </body>
</html>
