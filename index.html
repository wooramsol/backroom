<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backrooms — Level 0</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1810;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #2a2618 0%, #0d0c08 70%);
        color: #c9b87a;
        z-index: 10;
        cursor: pointer;
        user-select: none;
        transition: opacity 0.8s ease;
      }
      #overlay h1 {
        font-size: 2rem;
        font-weight: 300;
        letter-spacing: 0.35em;
        margin-bottom: 0.4rem;
      }
      #overlay .sub {
        font-size: 0.85rem;
        opacity: 0.55;
        letter-spacing: 0.2em;
        margin-bottom: 2rem;
      }
      #overlay .credit {
        font-size: 0.8rem;
        opacity: 0.5;
        letter-spacing: 0.12em;
        margin-bottom: 0.35rem;
      }
      #overlay .build {
        font-size: 0.65rem;
        opacity: 0.38;
        letter-spacing: 0.08em;
        font-variant-numeric: tabular-nums;
        margin-bottom: 2rem;
      }
      #overlay .hint {
        font-size: 0.75rem;
        opacity: 0.45;
        line-height: 2;
        text-align: center;
        max-width: 22rem;
      }
      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #resume-prompt {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(8, 7, 5, 0.45);
        color: #c9b87a;
        font-size: 0.8rem;
        letter-spacing: 0.14em;
        z-index: 8;
        cursor: pointer;
        user-select: none;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }
      #resume-prompt.visible {
        opacity: 1;
        pointer-events: auto;
      }
      #hud {
        position: fixed;
        bottom: 1.2rem;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(201, 184, 122, 0.3);
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        pointer-events: none;
        z-index: 5;
        opacity: 0;
        transition: opacity 1.2s ease 0.6s;
      }
      #hud.visible {
        opacity: 1;
      }
      #build-badge {
        position: fixed;
        bottom: 0.65rem;
        right: 0.75rem;
        color: rgba(201, 184, 122, 0.28);
        font-size: 0.58rem;
        letter-spacing: 0.06em;
        font-variant-numeric: tabular-nums;
        pointer-events: none;
        z-index: 5;
        opacity: 0;
        transition: opacity 1.2s ease 0.6s;
      }
      #build-badge.visible {
        opacity: 1;
      }
      #crosshair {
        position: fixed;
        left: 0;
        top: 0;
        width: 20px;
        height: 20px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 9;
        opacity: 0;
        transition: opacity 0.25s ease;
      }
      #crosshair.visible {
        opacity: 0.55;
      }
      #crosshair .ch-h,
      #crosshair .ch-v {
        position: absolute;
        background: rgba(255, 252, 240, 0.38);
        box-shadow: 0 0 1px rgba(0, 0, 0, 0.35);
      }
      #crosshair .ch-h {
        left: 0;
        right: 0;
        top: 50%;
        height: 2px;
        transform: translateY(-50%);
      }
      #crosshair .ch-v {
        top: 0;
        bottom: 0;
        left: 50%;
        width: 2px;
        transform: translateX(-50%);
      }
      #vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 4;
        background: radial-gradient(
          ellipse at center,
          transparent 52%,
          rgba(0, 0, 0, 0.22) 100%
        );
        opacity: 0;
        transition: opacity 1.2s ease;
      }
      #vignette.visible {
        opacity: 1;
      }
    </style>
    <script type="module" crossorigin src="/backroom/assets/index-IymKTANT.js"></script>
  </head>
  <body>
    <div id="overlay">
      <h1>BACKROOMS</h1>
      <p class="sub">LEVEL 0 — THE LOBBY</p>
      <p class="credit">Created by Ramsol</p>
      <p class="build" id="build-label"></p>
      <div class="hint">
        Click to start<br />
        WASD · Move &nbsp; Shift · Run &nbsp; Space · Jump &nbsp; Mouse · Look
      </div>
    </div>
    <div id="hud">LEVEL 0</div>
    <div id="build-badge"></div>
    <div id="crosshair" aria-hidden="true">
      <span class="ch-h"></span>
      <span class="ch-v"></span>
    </div>
    <div id="vignette"></div>
    <div id="resume-prompt" hidden>Click to resume</div>
  </body>
</html>
