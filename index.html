<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backrooms — Level 0</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1810;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #2a2618 0%, #0d0c08 70%);
        color: #c9b87a;
        z-index: 10;
        cursor: pointer;
        user-select: none;
        transition: opacity 0.6s ease;
      }
      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #overlay h1 {
        font-size: 2rem;
        font-weight: 300;
        letter-spacing: 0.3em;
        margin-bottom: 0.5rem;
      }
      #overlay p {
        font-size: 0.9rem;
        opacity: 0.7;
        margin-bottom: 2rem;
      }
      #overlay .hint {
        font-size: 0.75rem;
        opacity: 0.5;
        line-height: 1.8;
        text-align: center;
      }
      #hud {
        position: fixed;
        bottom: 1rem;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(201, 184, 122, 0.35);
        font-size: 0.7rem;
        letter-spacing: 0.15em;
        pointer-events: none;
        z-index: 5;
        opacity: 0;
        transition: opacity 1s ease 0.5s;
      }
      #hud.visible {
        opacity: 1;
      }
      #vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 4;
        background: radial-gradient(
          ellipse at center,
          transparent 50%,
          rgba(0, 0, 0, 0.45) 100%
        );
        opacity: 0;
        transition: opacity 1s ease;
      }
      #vignette.visible {
        opacity: 1;
      }
      canvas {
        display: block;
      }
    </style>
    <script type="module" crossorigin src="/backroom/assets/index-Cyfk7ofE.js"></script>
  </head>
  <body>
    <div id="overlay">
      <h1>BACKROOMS</h1>
      <p>Level 0</p>
      <div class="hint">
        클릭하여 시작<br />
        WASD — 이동 · Shift — 달리기 · 마우스 — 시야<br />
        계단 앞에서 W — 위/아래 층 이동
      </div>
    </div>
    <div id="hud">LEVEL 0 — THE LOBBY</div>
    <div id="vignette"></div>
  </body>
</html>
