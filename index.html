<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Backrooms — Level 0</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1810;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #2a2618 0%, #0d0c08 70%);
        color: #c9b87a;
        z-index: 10;
        cursor: pointer;
        user-select: none;
        transition: opacity 0.8s ease;
      }
      #overlay h1 {
        font-size: 2rem;
        font-weight: 300;
        letter-spacing: 0.35em;
        margin-bottom: 0.4rem;
      }
      #overlay .sub {
        font-size: 0.85rem;
        opacity: 0.55;
        letter-spacing: 0.2em;
        margin-bottom: 2rem;
      }
      #overlay .credit {
        font-size: 0.8rem;
        opacity: 0.5;
        letter-spacing: 0.12em;
        margin-bottom: 0.35rem;
        text-align: center;
      }
      #overlay .bgm-credit {
        font-size: 0.72rem;
        opacity: 0.42;
        letter-spacing: 0.08em;
        margin-bottom: 1.5rem;
        text-align: center;
      }
      #overlay .build {
        font-size: 0.65rem;
        opacity: 0.38;
        letter-spacing: 0.08em;
        font-variant-numeric: tabular-nums;
        margin-bottom: 2rem;
      }
      #overlay .hint {
        font-size: 0.75rem;
        opacity: 0.45;
        line-height: 1.85;
        text-align: center;
        max-width: 22rem;
        margin-bottom: 1.75rem;
      }
      #overlay .hint-controls {
        margin-top: 1.5rem;
      }
      #overlay .hint-status {
        font-size: 0.82rem;
        letter-spacing: 0.05em;
        margin-bottom: 0.35rem;
      }
      #overlay .hint-status.loading {
        animation: hint-loading-pulse 1.1s ease-in-out infinite;
      }
      @keyframes hint-loading-pulse {
        0%,
        100% {
          opacity: 0.32;
        }
        50% {
          opacity: 1;
        }
      }
      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #resume-prompt {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(8, 7, 5, 0.45);
        color: #c9b87a;
        font-size: 0.8rem;
        letter-spacing: 0.14em;
        z-index: 8;
        cursor: pointer;
        user-select: none;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }
      #resume-prompt.visible {
        opacity: 1;
        pointer-events: auto;
      }
      #hud {
        position: fixed;
        bottom: 1.2rem;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(201, 184, 122, 0.3);
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        pointer-events: none;
        z-index: 5;
        opacity: 0;
        transition: opacity 1.2s ease 0.6s;
      }
      #hud.visible {
        opacity: 1;
      }
      #build-badge {
        position: fixed;
        bottom: 0.65rem;
        right: 0.75rem;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.18rem;
        pointer-events: none;
        z-index: 5;
        opacity: 0;
        transition: opacity 1.2s ease 0.6s;
        text-align: right;
        line-height: 1.35;
      }
      #build-badge .bb-line {
        color: rgba(201, 184, 122, 0.58);
        font-size: 0.58rem;
        letter-spacing: 0.06em;
        font-variant-numeric: tabular-nums;
      }
      #build-badge .bb-credit {
        font-size: 0.54rem;
        letter-spacing: 0.1em;
        text-transform: lowercase;
      }
      #build-badge.visible {
        opacity: 1;
      }
      #crosshair {
        position: fixed;
        left: 0;
        top: 0;
        width: 26px;
        height: 26px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 9;
        opacity: 0;
        transition: opacity 0.25s ease;
      }
      #crosshair.visible {
        opacity: 0.45;
      }
      #crosshair .ch-h,
      #crosshair .ch-v {
        position: absolute;
        background: rgba(255, 248, 232, 0.42);
        box-shadow: 0 0 2px rgba(0, 0, 0, 0.35);
      }
      #crosshair .ch-h {
        left: 0;
        right: 0;
        top: 50%;
        height: 2.5px;
        transform: translateY(-50%);
      }
      #crosshair .ch-v {
        top: 0;
        bottom: 0;
        left: 50%;
        width: 2.5px;
        transform: translateX(-50%);
      }
      #vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 4;
        background: radial-gradient(
          ellipse at center,
          transparent 52%,
          rgba(0, 0, 0, 0.22) 100%
        );
        opacity: 0;
        transition: opacity 1.2s ease;
      }
      #vignette.visible {
        opacity: 1;
      }

      /* —— Mobile touch controls —— */
      #mobile-controls {
        position: fixed;
        inset: 0;
        z-index: 12;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.35s ease;
      }
      #mobile-controls.visible {
        opacity: 1;
      }
      .mc-stick-base,
      .mc-look-zone,
      .mc-btn {
        pointer-events: auto;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      .mc-stick-base {
        position: absolute;
        left: max(1rem, env(safe-area-inset-left));
        bottom: max(1.25rem, env(safe-area-inset-bottom));
        width: 112px;
        height: 112px;
        border-radius: 50%;
        background: rgba(201, 184, 122, 0.08);
        border: 1px solid rgba(201, 184, 122, 0.22);
      }
      .mc-stick-knob {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        background: rgba(201, 184, 122, 0.28);
        border: 1px solid rgba(201, 184, 122, 0.45);
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.25);
      }
      .mc-look-zone {
        position: absolute;
        right: 0;
        top: 0;
        width: 52%;
        height: 100%;
      }
      .mc-actions {
        position: absolute;
        right: max(1rem, env(safe-area-inset-right));
        bottom: max(1.25rem, env(safe-area-inset-bottom));
        z-index: 2;
        pointer-events: none;
      }
      .mc-btn {
        min-width: 4.6rem;
        height: 2.8rem;
        padding: 0 1rem;
        border-radius: 999px;
        border: 1px solid rgba(201, 184, 122, 0.35);
        background: rgba(26, 24, 16, 0.55);
        color: rgba(201, 184, 122, 0.88);
        font-size: 0.72rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .mc-btn.pressed {
        background: rgba(201, 184, 122, 0.28);
        border-color: rgba(201, 184, 122, 0.6);
      }
      html.mobile #overlay .hint-controls {
        font-size: 0.72rem;
      }
      html.mobile .mc-actions {
        bottom: max(2.6rem, calc(env(safe-area-inset-bottom) + 1.35rem));
      }
      @media (orientation: portrait) {
        .mc-stick-base {
          width: 100px;
          height: 100px;
          bottom: max(1.5rem, env(safe-area-inset-bottom));
        }
        .mc-look-zone {
          width: 58%;
          bottom: 0;
          height: calc(100% - 7.5rem);
        }
        .mc-actions {
          bottom: max(2.75rem, calc(env(safe-area-inset-bottom) + 1.5rem));
        }
      }
    </style>
    <script type="module" crossorigin src="/backroom/assets/index-DkZlU48_.js"></script>
  </head>
  <body>
    <div id="overlay">
      <h1>BACKROOMS</h1>
      <p class="sub">LEVEL 0 — THE LOBBY</p>
      <p class="build" id="build-label"></p>
      <div class="hint">
        <div class="hint-status" id="hint-status">Loading… please wait</div>
        <div class="hint-controls">
          Move: WASD<br />
          Run: Shift<br />
          Jump: Space<br />
          Crouch: C<br />
          Look: Mouse
        </div>
      </div>
      <p class="credit">Created by @wooramsol</p>
      <p class="bgm-credit">BGM credit: Kane Parsons, Kane Pixel</p>
    </div>
    <div id="hud">LEVEL 0</div>
    <div id="build-badge">
      <div class="bb-line bb-version" id="build-version"></div>
      <div class="bb-line bb-credit">created by @WOORAMSOL</div>
    </div>
    <div id="crosshair" aria-hidden="true">
      <span class="ch-h"></span>
      <span class="ch-v"></span>
    </div>
    <div id="vignette"></div>
    <div id="mobile-controls" hidden>
      <div class="mc-stick-base" aria-label="Move">
        <div class="mc-stick-knob"></div>
      </div>
      <div class="mc-look-zone" aria-label="Look"></div>
      <div class="mc-actions">
        <button type="button" class="mc-btn mc-btn-jump">Jump</button>
      </div>
    </div>
    <div id="resume-prompt" hidden>Click to resume</div>
  </body>
</html>
