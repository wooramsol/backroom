name: CI, Auto-merge, Deploy

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  pages: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Require user-provided assets
        run: |
          if [ ! -f public/assets/wallpaper2.jpg ]; then
            echo "::error::Add your wallpaper at public/assets/wallpaper2.jpg (do not auto-generate)."
            exit 1
          fi
          if [ ! -f public/assets/bottom2.jpg ]; then
            echo "::error::Add your floor/ceiling texture at public/assets/bottom2.jpg (do not auto-generate)."
            exit 1
          fi

      - run: npm ci
      - name: Set build metadata
        run: |
          echo "BUILD_TIME=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          echo "BUILD_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
          PR=$(git log -1 --pretty=%B | sed -n 's/^Merge pull request #\([0-9]*\).*/\1/p')
          if [ -n "$PR" ]; then echo "BUILD_PR=$PR" >> $GITHUB_ENV; fi
      - run: npm run build
        env:
          VITE_BASE: /backroom/
          BUILD_ENV: dev

  auto-merge:
    needs: build
    if: >-
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'cursor/') &&
      github.actor != 'dependabot[bot]' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request.number;
            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pr,
              merge_method: 'merge',
            });
            core.info(`Merged PR #${pr} into main`);

  promote:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/cursor/')
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge cursor branch into main
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull origin main
          git merge "origin/$BRANCH" -m "chore: auto-promote $BRANCH to main"
          git push origin main

  deploy-dev:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Set build metadata
        run: |
          echo "BUILD_TIME=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          echo "BUILD_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
          PR=$(git log -1 --pretty=%B | sed -n 's/^Merge pull request #\([0-9]*\).*/\1/p')
          if [ -n "$PR" ]; then echo "BUILD_PR=$PR" >> $GITHUB_ENV; fi
      - run: npm run build
        env:
          VITE_BASE: /backroom/
          BUILD_ENV: dev

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

  # GITHUB_TOKEN merges do not trigger push workflows — deploy right after auto-merge
  deploy-dev-after-pr-merge:
    needs: [build, auto-merge]
    if: >-
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'cursor/') &&
      github.event.pull_request.draft == false &&
      needs.auto-merge.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest main after merge
        run: git pull origin main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Set build metadata
        run: |
          echo "BUILD_TIME=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          echo "BUILD_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "BUILD_PR=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
      - run: npm run build
        env:
          VITE_BASE: /backroom/
          BUILD_ENV: dev

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

  deploy-dev-after-promote:
    needs: [build, promote]
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/heads/cursor/') &&
      needs.promote.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Set build metadata
        run: |
          echo "BUILD_TIME=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          echo "BUILD_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
          PR=$(git log -1 --pretty=%B | sed -n 's/^Merge pull request #\([0-9]*\).*/\1/p')
          if [ -n "$PR" ]; then echo "BUILD_PR=$PR" >> $GITHUB_ENV; fi
      - run: npm run build
        env:
          VITE_BASE: /backroom/
          BUILD_ENV: dev

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
