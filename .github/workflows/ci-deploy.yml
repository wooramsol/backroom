name: CI, Auto-merge, Deploy

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  pages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: /backroom/

  auto-merge:
    needs: build
    if: >-
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'cursor/') &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request.number;
            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pr,
              merge_method: 'merge',
            });
            core.info(`Merged PR #${pr} into main`);

  promote:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/cursor/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge cursor branch into main
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull origin main
          git merge "origin/$BRANCH" -m "chore: auto-promote $BRANCH to main"
          git push origin main

  # Deploy from the branch that was just built (GITHUB_TOKEN main pushes don't re-trigger workflows)
  deploy-after-promote:
    needs: [build, promote]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/cursor/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: /backroom/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

  deploy-after-merge:
    needs: [build, auto-merge]
    if: >-
      github.event_name == 'pull_request' &&
      needs.build.result == 'success' &&
      needs.auto-merge.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: /backroom/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: /backroom/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
