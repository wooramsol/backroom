name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag to deploy
        required: false
        default: main
  push:
    branches: [production]

permissions:
  contents: read

concurrency:
  group: pages-deploy-prod
  cancel-in-progress: true

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || 'main' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Require user-provided assets
        run: |
          if [ ! -f public/assets/wallpaper2.jpg ]; then
            echo "::error::Add your wallpaper at public/assets/wallpaper2.jpg (do not auto-generate)."
            exit 1
          fi
          if [ ! -f public/assets/bottom2.jpg ]; then
            echo "::error::Add your floor/ceiling texture at public/assets/bottom2.jpg (do not auto-generate)."
            exit 1
          fi

      - run: npm ci
      - name: Set build metadata
        run: bash scripts/build-metadata.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run build
        env:
          VITE_BASE: /backroom-live/
          BUILD_ENV: prod

      - name: Select deploy method
        id: method
        env:
          HAS_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
          HAS_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          if [ -n "$HAS_KEY" ]; then
            echo "method=key" >> "$GITHUB_OUTPUT"
          elif [ -n "$HAS_TOKEN" ]; then
            echo "method=token" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Add PAGES_DEPLOY_KEY or PAGES_DEPLOY_TOKEN to backroom secrets."
            exit 1
          fi

      - name: Publish via deploy key
        if: steps.method.outputs.method == 'key'
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PAGES_DEPLOY_KEY }}
          external_repository: wooramsol/backroom-live
          publish_branch: gh-pages
          publish_dir: ./dist

      - name: Publish via PAT
        if: steps.method.outputs.method == 'token'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: wooramsol/backroom-live
          publish_branch: gh-pages
          publish_dir: ./dist
