name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag to deploy
        required: false
        default: main
  push:
    branches: [production]

permissions:
  contents: read

concurrency:
  group: pages-deploy-prod
  cancel-in-progress: true

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || 'main' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Require user-provided wallpaper
        run: |
          if [ ! -f public/assets/backroom_wallpaper.webp ]; then
            echo "::error::Add your wallpaper at public/assets/backroom_wallpaper.webp (do not auto-generate)."
            exit 1
          fi

      - run: npm ci
      - name: Set build time
        run: echo "BUILD_TIME=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
      - run: npm run build
        env:
          VITE_BASE: /backroom-live/
          BUILD_ENV: prod

      - name: Verify deploy token
        run: |
          if [ -z "${{ secrets.PAGES_DEPLOY_TOKEN }}" ]; then
            echo "::error::PAGES_DEPLOY_TOKEN secret is missing. Add it in backroom repo Settings → Secrets."
            exit 1
          fi

      - name: Publish to backroom-live gh-pages
        env:
          DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          cd dist
          touch .nojekyll
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy production ${BUILD_TIME} KST"
          git branch -M gh-pages
          git remote add origin https://github.com/wooramsol/backroom-live.git
          git -c http.extraheader="AUTHORIZATION: bearer ${DEPLOY_TOKEN}" push -f origin gh-pages
